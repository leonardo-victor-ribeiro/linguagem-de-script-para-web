<html>
  <head>
    <meta charset="UTF-8" />
    <title>Aula 3 - Exercicio 5</title>
  </head>
  <body>
    <h1>Aula 3 - Exercicio 5</h1>
    <div id="div-dados">
      <p>JEAN CARLOS DE SOUZA SILVA</p>
      <p>MATHEUS MACEDO DE FREITAS</p>
      <p>GUSTAVO NAVES DE SOUZA</p>
      <p>PATRICIA TANIMOTO TANAKA</p>
      <p>DEBORA BONFIM GUEDES</p>
      <p>HEBERT OLIVEIRA BRAGA</p>
    </div>
    <div id="div-ordenado"></div>

    <script>
      let lista = document
        .getElementById("div-dados")
        .getElementsByTagName("p");

      let listaOrdenada = [];

      for (let i = 0; i < lista.length; i++) {
        listaOrdenada.push(lista[i].textContent);
      }

      listaOrdenada = listaOrdenada.sort();
      let divOrdenado = document.getElementById("div-ordenado");

      for (let i = 0; i < listaOrdenada.length; i++) {
        let p = document.createElement("p");
        p.textContent = listaOrdenada[i];
        divOrdenado.appendChild(p);
      }
    </script>
  </body>
</html>
