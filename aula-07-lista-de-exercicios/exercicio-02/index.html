<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercício 02</title>
  </head>
  <body></body>

  <script>
    const inputtxt = window.document.createElement("input");
    inputtxt.setAttribute("type", "text");

    const labeltxt = window.document.createElement("label");

    const body = window.document.querySelector("body");
    body.appendChild(inputtxt);
    body.appendChild(labeltxt);

    inputtxt.addEventListener("blur", () => {
      labeltxt.textContent = inputtxt.value;
    });
  </script>
</html>
