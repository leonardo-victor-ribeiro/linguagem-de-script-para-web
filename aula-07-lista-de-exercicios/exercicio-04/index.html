<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercício 04</title>
  </head>
  <body></body>

  <script>
    const states = [
      {
        state: "São Paulo",
        cities: ["São Paulo", "Jales", "São José do Rio Preto"],
      },
      {
        state: "Minas Gerais",
        cities: ["Uberaba", "Uberlândia", "Belo Horizonte"],
      },
      {
        state: "Rio de Janeiro",
        cities: ["Rio de Janeiro", "Niterói", "Petrópolis"],
      },
      {
        state: "Espírito Santo",
        cities: ["Vitória", "Guarapari", "Domingos Martins"],
      },
    ];

    const stateSelect = window.document.createElement("select");
    const stateDefault = window.document.createElement("option");
    stateDefault.textContent = "Escolha um estado:";
    stateDefault.value = "";
    stateDefault.setAttribute("selected", true);
    stateSelect.appendChild(stateDefault);

    let stateIndex = 0;
    states.forEach((state) => {
      let stateOption = window.document.createElement("option");
      stateOption.textContent = state.state;
      stateOption.value = stateIndex;
      stateSelect.appendChild(stateOption);
      stateIndex++;
    });

    const h1 = window.document.createElement("h1");
    h1.textContent = "Exercício 4";

    const body = window.document.querySelector("body");
    body.appendChild(h1);
    body.appendChild(stateSelect);

    const citiesSelect = window.document.createElement("select");
    const cityDefault = window.document.createElement("option");
    cityDefault.textContent = "Escolha uma cidade";
    cityDefault.setAttribute("selected", true);
    cityDefault.value = "";
    citiesSelect.appendChild(cityDefault);
    citiesSelect.style.display = "none";

    body.appendChild(citiesSelect);

    stateSelect.addEventListener("change", () => {
      stateSelect.value !== ""
        ? (citiesSelect.style.display = "block")
        : (citiesSelect.style.display = "none");
    });
  </script>
</html>
