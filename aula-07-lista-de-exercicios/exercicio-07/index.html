<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercício 07</title>
  </head>
  <body></body>

  <script>
    function CreateDiv(
      width,
      height,
      borderRadius,
      backgroundColor,
      className
    ) {
      const div = window.document.createElement("div");
      div.style.width = width;
      div.style.height = width;
      div.style.borderRadius = borderRadius;
      div.style.backgroundColor = backgroundColor;
      div.setAttribute("class", className);

      div.addEventListener("mouseover", changeSemaphore);
      div.addEventListener("mouseleave", changeSemaphore);

      return div;
    }

    function changeSemaphore() {
      if (this.classList.length > 1) {
        this.className = this.classList[0];
        this.style.backgroundColor = "gray";
        return;
      }

      if (this.className === "alert") {
        this.className = "alert on";
        this.style.backgroundColor = "red";
      }

      if (this.className === "warning") {
        this.className = "free on";
        this.style.backgroundColor = "yellow";
      }

      if (this.className === "free") {
        this.className = "free on";
        this.style.backgroundColor = "green";
      }
    }

    const div1 = CreateDiv("100px", "100px", "50px", "gray", "alert");
    const div2 = CreateDiv("100px", "100px", "50px", "gray", "warning");
    const div3 = CreateDiv("100px", "100px", "50px", "gray", "free");

    const body = window.document.querySelector("body");
    body.append(div1, div2, div3);
  </script>
</html>
